upstream mcp_server {
    server mcp-server:8000;
}

upstream loader_ui {
    server loader:8501;
}

server {
    listen 80;
    server_name _;

    # MCP Server — main endpoint for IDE clients
    # Supports SSE (Server-Sent Events) and Streamable HTTP
    location /mcp {
        proxy_pass http://mcp_server/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # SSE endpoint (legacy)
    location /sse {
        proxy_pass http://mcp_server/sse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Health check (public)
    location /health {
        proxy_pass http://mcp_server/health;
    }

    # Loader UI — protected with basic auth
    location /loader/ {
        auth_basic "MCP Admin";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

        proxy_pass http://loader_ui/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Streamlit static assets (needed for loader)
    location /_stcore/ {
        auth_basic "MCP Admin";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

        proxy_pass http://loader_ui/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Block everything else
    location / {
        return 404 '{"error": "Not found. Use /mcp for MCP protocol."}';
        add_header Content-Type application/json;
    }
}

