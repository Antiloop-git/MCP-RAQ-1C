services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      # - "${NGINX_HTTPS_PORT:-443}:443"  # Uncomment when SSL is ready
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/conf.d/.htpasswd:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # Uncomment when SSL is ready
    depends_on:
      mcp-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mcp-network

  parser:
    build: ./parser
    ports:
      - "127.0.0.1:${PARSER_PORT:-8001}:8001"
    volumes:
      - ${CONFIG_HOST_PATH:-./configuration}:/app/configuration:ro
      - ${BIN_HOST_PATH:-./bin}:/app/bin:ro
    environment:
      - CONFIG_PATH=${CONFIG_PATH:-/app/configuration/Prod}
      - HBK_PATH=${HBK_PATH:-/app/bin/1cv8_ru.hbk}
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\"" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - mcp-network

  embeddings:
    build: ./embeddings
    ports:
      - "127.0.0.1:${EMBEDDINGS_PORT:-5050}:5000"
    volumes:
      - model_cache:/home/appuser/.cache/huggingface
    environment:
      - MODEL_NAME=${MODEL_NAME:-sergeyzh/BERTA}
      - MODEL_DIMENSIONS=${MODEL_DIMENSIONS:-768}
      - HOST=0.0.0.0
      - PORT=5000
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          memory: 3G

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          memory: 2G

  loader:
    build: ./loader
    ports:
      - "127.0.0.1:${LOADER_PORT:-8501}:8501"
    volumes:
      - ${BSL_MODULES_PATH:-./parsed_metadata/modules}:/app/modules:ro
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_SERVICE_URL=http://embeddings:5000
      - PARSER_SERVICE_URL=http://parser:8001
      - ROW_BATCH_SIZE=${ROW_BATCH_SIZE:-200}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-32}
      - VECTOR_DIMENSIONS=${VECTOR_DIMENSIONS:-768}
      - DEFAULT_COLLECTION=${DEFAULT_COLLECTION:-metadata_1c}
    depends_on:
      qdrant:
        condition: service_healthy
      embeddings:
        condition: service_healthy
      parser:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          memory: 1G

  bsl-ls:
    build: ./bsl-ls
    ports:
      - "127.0.0.1:${BSL_LS_PORT:-8005}:8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          memory: 512M

  mcp-server:
    build: ./mcp-server
    ports:
      - "127.0.0.1:${MCP_SERVER_PORT:-8000}:8000"
    volumes:
      - ${PARSED_METADATA_PATH:-./parsed_metadata}:/app/parsed_metadata:ro
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_SERVICE_URL=http://embeddings:5000
      - DEFAULT_COLLECTION=${DEFAULT_COLLECTION:-metadata_1c}
      - PORT=8000
      - HOST=0.0.0.0
      - SEARCH_LIMIT=${SEARCH_LIMIT:-10}
      # OData integration (optional — set ODATA_URL to enable live data tools)
      - ODATA_URL=${ODATA_URL:-}
      - ODATA_USER=${ODATA_USER:-}
      - ODATA_PASSWORD=${ODATA_PASSWORD:-}
      - ODATA_TIMEOUT=${ODATA_TIMEOUT:-30000}
      # BSL Language Server (optional)
      - BSL_LS_URL=${BSL_LS_URL:-http://bsl-ls:8005}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  qdrant_data:
  model_cache:


networks:
  mcp-network:
    driver: bridge
